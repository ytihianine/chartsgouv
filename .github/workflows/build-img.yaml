name: Build and Push Chartsgouv Image

on:
  push:
    branches:
      - main

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Registry
        env:
          REGISTRY: ghcr.io  # Change to your registry if needed
          USERNAME: ${{ secrets.DOCKER_USERNAME }}
          PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: echo "$PASSWORD" | docker login $REGISTRY -u "$USERNAME" --password-stdin

      - name: Set Environment Variables
        run: |
          echo "DSFR_VERSION=1.13.0" >> $GITHUB_ENV
          echo "DSFR_CHART_VERSION=1.0.0" >> $GITHUB_ENV
          echo "SUPERSET_REPO=apache/superset" >> $GITHUB_ENV
          echo "SUPERSET_VERSION=4.1.1" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        env:
          REGISTRY_IMAGE: ghcr.io/ytihianine/chartsgouv
        run: |
          echo "DSFR_VERSION -- $DSFR_VERSION"
          echo "DSFR_CHART_VERSION -- $DSFR_CHART_VERSION"
          echo "SUPERSET_VERSION -- $SUPERSET_VERSION"
          docker build -f Dockerfile --build-arg TAG_DSFR=${DSFR_VERSION} --build-arg TAG_DSFR_CHART=${DSFR_CHART_VERSION} --build-arg SUPERSET_VERSION=${SUPERSET_VERSION} -t $REGISTRY_IMAGE:${SUPERSET_VERSION} .
          docker push $REGISTRY_IMAGE:${SUPERSET_VERSION}-${DSFR_VERSION}
